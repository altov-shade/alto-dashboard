<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alto Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f10;
      color: white;
    }

    .container {
      padding: 30px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      padding: 20px;
      border-radius: 20px;
      background: #1a1a1d;
      border: 1px solid #333;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    /* 🔥 GLASS HOVER EFFECT */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      opacity: 0;
      transition: 0.3s ease;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .orange { background: #ff7a00; color: black; }
    .gold { background: #f4b400; color: black; }
    .rose { background: #c2185b; }
    .gray { background: #6b7280; }

    .title {
      font-size: 20px;
      font-weight: bold;
      position: relative;
      z-index: 1;
    }

    .desc {
      font-size: 14px;
      margin-top: 8px;
      opacity: 0.85;
      position: relative;
      z-index: 1;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Alto Dashboard</h1>

    <div class="grid">

      <a href="#" class="card orange">
        <div class="title">🎯 Targeter</div>
        <div class="desc">Find brand matches</div>
      </a>

      <a href="#" class="card gold">
        <div class="title">📋 Briefs</div>
        <div class="desc">Create strategy briefs</div>
      </a>

      <a href="#" class="card rose">
        <div class="title">🖼️ Brand Assets</div>
        <div class="desc">Store visuals</div>
      </a>

      <a href="https://altov-shade-matcher.vercel.app/" target="_blank" class="card gray">
        <div class="title">✨ Shade Matcher</div>
        <div class="desc">Beauty AI tool</div>
      </a>

    </div>
  </div>
</body>
</html>
