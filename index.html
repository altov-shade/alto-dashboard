<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alto Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f10;
      color: white;
    }

    .container {
      padding: 30px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      padding: 20px;
      border-radius: 20px;
      background: #1a1a1d;
      border: 1px solid #333;
      transition: 0.3s;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .orange { background: #ff7a00; color: black; }
    .gold { background: #f4b400; color: black; }
    .rose { background: #c2185b; }
    .gray { background: #6b7280; }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .desc {
      font-size: 14px;
      margin-top: 8px;
      opacity: 0.8;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Alto Dashboard</h1>

    <div class="grid">
      <div class="card orange">🎯 Targeter<br><span class="desc">Find brand matches</span></div>
      <div class="card gold">📋 Briefs<br><span class="desc">Create strategy briefs</span></div>
      <div class="card rose">🖼️ Brand Assets<br><span class="desc">Store visuals</span></div>
      <div class="card gray">✨ Shade Matcher<br><span class="desc">Beauty AI tool</span></div>
    </div>
  </div>
</body>
</html>
